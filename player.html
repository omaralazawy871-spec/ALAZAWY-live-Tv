<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <link href="https://vjs.zencdn.net/8.3.0/video-js.css" rel="stylesheet" />
    <style>
        body { margin: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        #my-player { width: 100%; max-width: 800px; }
        .start-btn { padding: 20px 40px; font-size: 20px; cursor: pointer; background: #e50914; color: white; border: none; border-radius: 10px; }
    </style>
</head>
<body>

    <button id="startBtn" class="start-btn">اضغط لمشاهدة القناة</button>

    <video id="my-player" class="video-js vjs-big-play-centered" controls playsinline></video>
    
    <audio id="my-audio" src="http://anisfm.pp.ua/Mx2"></audio>

    <script src="https://vjs.zencdn.net/8.3.0/video.min.js"></script>
    <script>
        const startBtn = document.getElementById('startBtn');
        const audio = document.getElementById('my-audio');
        
        startBtn.addEventListener('click', async function() {
            startBtn.style.display = 'none';
            
            const player = videojs('my-player', {
                autoplay: true,
                muted: true,
                sources: [{
                    src: 'https://yayin.itv.az/itv/itv.m3u8',
                    type: 'application/x-mpegURL'
                }]
            });
            
            // تشغيل الصوت بعد تأخير بسيط جداً لضمان عمل الفيديو
            setTimeout(() => {
                audio.play().catch(e => console.log("Audio play failed:", e));
            }, 500);
        });
    </script>
</body>
</html>
