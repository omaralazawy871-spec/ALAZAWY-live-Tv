<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ALAZAWY Live TV</title>
    <style>
        body { background-color: #000; color: white; font-family: Arial, sans-serif; text-align: center; margin: 0; padding: 20px; }
        h1 { color: #e50914; }
        #channels-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 30px; }
        .channel-card { background: #111; padding: 15px; border-radius: 10px; cursor: pointer; width: 160px; border: 1px solid #333; transition: 0.3s; }
        .channel-card:hover { background: #e50914; border-color: #e50914; }
        .channel-card img { width: 100%; border-radius: 5px; height: 100px; object-fit: contain; margin-bottom: 10px; }
        .channel-card h3 { font-size: 14px; margin: 0; }
    </style>
</head>
<body>
    <h1>📺 القنوات الرياضية العربية</h1>
    <div id="channels-container"></div>
    <script src="script.js"></script>
</body>
</html>
